<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加密记事本</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/14.1.4/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .markdown-preview { line-height: 1.7; }
        .markdown-preview h1, .markdown-preview h2 { border-bottom: 1px solid #374151; padding-bottom: 0.3em; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <!-- 密码屏 -->
    <div id="password-screen" class="min-h-screen flex items-center justify-center">
        <div class="max-w-md w-full mx-4 bg-zinc-900 rounded-3xl shadow-2xl p-10">
            <div class="flex justify-center mb-6">
                <div class="w-16 h-16 bg-emerald-500 rounded-2xl flex items-center justify-center text-3xl">🔐</div>
            </div>
            <h1 class="text-3xl font-semibold text-center mb-2">加密记事本</h1>
            <p class="text-zinc-400 text-center mb-8">输入密码后开始安全记录</p>
            <input type="password" id="passInput" 
                   class="w-full bg-zinc-800 border border-zinc-700 focus:border-emerald-500 rounded-2xl px-6 py-4 text-lg outline-none transition-all"
                   placeholder="输入密码 Karlienos" autocomplete="off">
            <button onclick="checkPassword()" 
                    class="mt-6 w-full bg-emerald-500 hover:bg-emerald-600 text-white font-medium py-4 rounded-2xl text-lg transition-all">
                进入记事本
            </button>
            <p id="msg" class="text-center mt-4 text-sm"></p>
        </div>
    </div>

    <!-- 记事本主界面 -->
    <div id="notepad" class="hidden min-h-screen flex flex-col">
        <div class="bg-zinc-900 border-b border-zinc-800 px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center text-xl">📝</div>
                <h2 class="text-2xl font-semibold">我的加密笔记</h2>
            </div>
            <div id="status" class="text-emerald-400 text-sm flex items-center gap-2">
                <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
                已自动加密保存
            </div>
        </div>
        
        <div class="flex flex-1 overflow-hidden">
            <!-- 编辑区 -->
            <div class="flex-1 flex flex-col border-r border-zinc-800">
                <div class="px-6 py-3 bg-zinc-900 border-b border-zinc-800 text-zinc-400 text-sm font-medium flex items-center">
                    <span>Markdown 编辑</span>
                    <span class="ml-auto text-xs bg-zinc-800 px-3 py-1 rounded-xl">所见即所得预览</span>
                </div>
                <textarea id="noteText" 
                          class="flex-1 bg-zinc-950 p-6 text-lg resize-none outline-none font-light leading-relaxed"
                          placeholder="在这里用 Markdown 写笔记...&#10;支持 # 标题、**加粗**、- 列表、[链接](url) 等"></textarea>
            </div>
            
            <!-- 实时预览区 -->
            <div class="flex-1 flex flex-col bg-zinc-900 overflow-auto">
                <div class="px-6 py-3 bg-zinc-900 border-b border-zinc-800 text-zinc-400 text-sm font-medium">实时预览</div>
                <div id="preview" class="markdown-preview flex-1 p-8 prose prose-invert max-w-none overflow-auto"></div>
            </div>
        </div>
    </div>

    <script>
        const correctHash = "736963664b49ebe36459910f2c9171204f4914610a6c9ab6b19bc6df11bcd0c2";
        let currentPassword = '';
        let saveTimeout = null;

        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function checkPassword() {
            const input = document.getElementById('passInput').value.trim();
            const msgEl = document.getElementById('msg');
            if (!input) { msgEl.innerHTML = '<span class="text-red-400">请输入密码</span>'; return; }
            
            const inputHash = await sha256(input);
            if (inputHash === correctHash) {
                currentPassword = input;
                document.getElementById('password-screen').classList.add('hidden');
                document.getElementById('notepad').classList.remove('hidden');
                loadNotes();
            } else {
                msgEl.innerHTML = '<span class="text-red-400">密码错误，请重试</span>';
            }
        }

        function loadNotes() {
            const saved = localStorage.getItem('encryptedNotepad');
            const textarea = document.getElementById('noteText');
            if (saved) {
                try {
                    const bytes = CryptoJS.AES.decrypt(saved, currentPassword);
                    const plaintext = bytes.toString(CryptoJS.enc.Utf8);
                    textarea.value = plaintext;
                } catch (e) {}
            }
            updatePreview();
            textarea.addEventListener('input', () => {
                updatePreview();
                autoSave();
            });
        }

        function updatePreview() {
            const markdown = document.getElementById('noteText').value;
            const previewEl = document.getElementById('preview');
            previewEl.innerHTML = marked.parse(markdown);
        }

        function autoSave() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                const textarea = document.getElementById('noteText');
                const encrypted = CryptoJS.AES.encrypt(textarea.value, currentPassword).toString();
                localStorage.setItem('encryptedNotepad', encrypted);
                const status = document.getElementById('status');
                status.innerHTML = `✅ 已自动加密保存`;
                setTimeout(() => {
                    status.innerHTML = `<span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span> 已自动加密保存`;
                }, 2000);
            }, 800);
        }

        // 回车确认密码
        document.getElementById('passInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') checkPassword();
        });

        // Tailwind 初始化
        function initTailwind() {
            return;
        }
    </script>
</body>
</html>
