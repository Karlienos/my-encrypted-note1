<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加密记事本</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .toastui-editor-main-container { background: #18181b !important; color: #f1f1f1; }
        .toastui-editor-contents { background: #18181b !important; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <!-- 密码屏 -->
    <div id="password-screen" class="min-h-screen flex items-center justify-center bg-zinc-950">
        <div class="max-w-md w-full mx-4 bg-zinc-900 rounded-3xl shadow-2xl p-10">
            <div class="flex justify-center mb-6">
                <div class="w-16 h-16 bg-emerald-500 rounded-2xl flex items-center justify-center text-3xl">🔐</div>
            </div>
            <h1 class="text-3xl font-semibold text-center mb-2">加密记事本</h1>
            <p class="text-zinc-400 text-center mb-8">输入密码继续</p>
            <input type="password" id="passInput" 
                   class="w-full bg-zinc-800 border border-zinc-700 focus:border-emerald-500 rounded-2xl px-6 py-4 text-lg outline-none transition-all"
                   placeholder="输入密码" autocomplete="off">
            <button onclick="checkPassword()" 
                    class="mt-6 w-full bg-emerald-500 hover:bg-emerald-600 text-white font-medium py-4 rounded-2xl text-lg transition-all">
                进入记事本
            </button>
            <p id="msg" class="text-center mt-4 text-sm"></p>
        </div>
    </div>

    <!-- 主界面 -->
    <div id="notepad" class="hidden min-h-screen flex flex-col">
        <div class="bg-zinc-900 border-b border-zinc-800 px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-emerald-500 rounded-2xl flex items-center justify-center text-xl">📝</div>
                <h2 class="text-2xl font-semibold">我的加密笔记</h2>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleMode()" id="mode-btn"
                        class="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 text-zinc-300 px-5 py-2 rounded-2xl text-sm font-medium transition-all">
                    📄 源文本
                </button>
                <div id="status" class="text-emerald-400 text-sm flex items-center gap-2">
                    <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
                    已自动加密保存
                </div>
            </div>
        </div>
        
        <!-- 编辑器容器 -->
        <div id="editor" class="flex-1 p-6 bg-zinc-950"></div>
    </div>

    <script>
        const correctHash = "736963664b49ebe36459910f2c9171204f4914610a6c9ab6b19bc6df11bcd0c2";
        let currentPassword = '';
        let editorInstance = null;
        let currentMode = 'wysiwyg'; // 默认富文本模式
        let saveTimeout = null;

        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function checkPassword() {
            const input = document.getElementById('passInput').value.trim();
            const msgEl = document.getElementById('msg');
            if (!input) { msgEl.innerHTML = '<span class="text-red-400">请输入密码</span>'; return; }
            
            const inputHash = await sha256(input);
            if (inputHash === correctHash) {
                currentPassword = input;
                document.getElementById('password-screen').classList.add('hidden');
                document.getElementById('notepad').classList.remove('hidden');
                initEditor();
            } else {
                msgEl.innerHTML = '<span class="text-red-400">密码错误，请重试</span>';
            }
        }

        function initEditor() {
            const saved = localStorage.getItem('encryptedNotepad');
            let initialMarkdown = '';
            if (saved) {
                try {
                    const bytes = CryptoJS.AES.decrypt(saved, currentPassword);
                    initialMarkdown = bytes.toString(CryptoJS.enc.Utf8);
                } catch (e) {}
            }

            editorInstance = new toastui.Editor({
                el: document.getElementById('editor'),
                height: '100%',
                initialEditType: 'wysiwyg',   // 默认富文本模式，可直接编辑
                previewStyle: 'none',
                initialValue: initialMarkdown,
                usageStatistics: false,
                toolbarItems: [
                    ['heading', 'bold', 'italic', 'strike'],
                    ['hr', 'quote', 'ul', 'ol'],
                    ['table', 'link']
                ]
            });

            editorInstance.on('change', autoSave);
        }

        function autoSave() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                if (!editorInstance) return;
                const markdown = editorInstance.getMarkdown();
                const encrypted = CryptoJS.AES.encrypt(markdown, currentPassword).toString();
                localStorage.setItem('encryptedNotepad', encrypted);
                const status = document.getElementById('status');
                status.innerHTML = `✅ 已自动加密保存`;
                setTimeout(() => {
                    status.innerHTML = `<span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span> 已自动加密保存`;
                }, 1800);
            }, 600);
        }

        // 切换整个编辑区模式（富文本 ↔ Markdown源码）
        function toggleMode() {
            if (!editorInstance) return;
            if (currentMode === 'wysiwyg') {
                editorInstance.changeMode('markdown');
                currentMode = 'markdown';
                document.getElementById('mode-btn').innerHTML = `📝 富文本模式`;
            } else {
                editorInstance.changeMode('wysiwyg');
                currentMode = 'wysiwyg';
                document.getElementById('mode-btn').innerHTML = `📄 源文本`;
            }
        }
    </script>
</body>
</html>
